function BudgetCalculator() {
  const baseline = GROWTH.baseline;
  const adSets = DEALS.adSets.filter(a => a.spend > 0 && a.cost_per_deal != null);
  const baseSpend = baseline.total_spend;
  const winRate = baseline.win_rate_pct / 100;
  const avgWon = baseline.avg_won_deal;
  const breakEvenCpd = baseline.break_even_cpd;

  const [budget, setBudget] = useState(Math.round(baseSpend * 1.6));
  const [mode, setMode] = useState('smart');

  const cplMult = (x) => 1 + 0.25*(x-1) + 0.05*Math.pow(x-1,2);

  const result = useMemo(() => {
    const mult = budget / baseSpend;
    if (mode === 'naive') {
      const effCpd = baseline.blended_cpd * cplMult(mult);
      const contacts = effCpd > 0 ? budget / effCpd : 0;
      const wins = contacts * winRate;
      const revenue = wins * avgWon;
      return { mode:'naive', mult, spend:budget, effCpd, contacts, wins, revenue, roas: budget>0 ? revenue/budget : 0, perSet: [] };
    }
    const perSet = adSets.map(a => {
      const cpd = a.cost_per_deal;
      if (cpd >= breakEvenCpd) return { ad_set:a.ad_set, action:'cut', new_spend:0, new_cpd:cpd, new_contacts:0 };
      let asMult;
      if (cpd < 100) asMult = mult * 1.2;
      else if (cpd < 140) asMult = mult * 1.0;
      else asMult = mult * 0.5;
      const newCpd = cpd * cplMult(asMult);
      const newSpend = a.spend * asMult;
      const newContacts = newCpd > 0 ? newSpend / newCpd : 0;
      return { ad_set:a.ad_set, action: cpd<100?'scale hard':cpd<140?'scale moderate':'hold', new_spend:newSpend, new_cpd:newCpd, new_contacts:newContacts };
    });
    const rawSpend = perSet.reduce((s,x) => s + x.new_spend, 0);
    const scale = rawSpend > 0 ? budget / rawSpend : 1;
    perSet.forEach(x => { x.new_spend *= scale; x.new_contacts *= scale; });
    const contacts = perSet.reduce((s,x) => s + x.new_contacts, 0);
    const wins = contacts * winRate;
    const revenue = wins * avgWon;
    const blendedCpd = contacts > 0 ? budget / contacts : 0;
    return { mode:'smart', mult, spend:budget, effCpd:blendedCpd, contacts, wins, revenue, roas: budget>0 ? revenue/budget : 0, perSet };
  }, [budget, mode]);

  const fmt = (n, d=0) => Math.round(n * Math.pow(10,d))/Math.pow(10,d);
  const money = (n) => `$${Math.round(n).toLocaleString()}`;
  const roasColor = result.roas >= 1.2 ? '#34d399' : result.roas >= 1.0 ? '#fbbf24' : '#f87171';
  const quickBtns = [0.5, 1, 1.5, 2, 2.5, 3].map(m => Math.round(baseSpend * m));

  return (
    <section className="card p-4">
      <div className="flex flex-wrap items-end justify-between gap-2 mb-3">
        <div>
          <h2 className="font-medium">Budget calculator</h2>
          <p className="text-xs muted">Input a monthly Meta budget and see predicted deal-contacts, wins, revenue, and ROAS using March baseline + fatigue model.</p>
        </div>
        <div className="flex items-center gap-2 text-xs">
          <button onClick={() => setMode('smart')} className={`px-3 py-1 rounded ${mode==='smart' ? 'bg-blue-600 text-white' : 'bg-slate-800 muted'}`}>Smart reallocation</button>
          <button onClick={() => setMode('naive')} className={`px-3 py-1 rounded ${mode==='naive' ? 'bg-blue-600 text-white' : 'bg-slate-800 muted'}`}>Naive (blended)</button>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div className="md:col-span-2">
          <label className="block text-xs muted mb-1">Monthly budget (USD)</label>
          <div className="flex items-center gap-2">
            <span className="text-sm muted">$</span>
            <input type="number" min="0" step="500" value={budget}
              onChange={e => setBudget(Math.max(0, parseInt(e.target.value) || 0))}
              className="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-lg font-semibold" />
          </div>
          <input type="range" min={0} max={baseSpend * 5} step={500} value={Math.min(budget, baseSpend*5)}
            onChange={e => setBudget(parseInt(e.target.value))}
            className="w-full mt-3" />
          <div className="flex gap-1 mt-2 text-xs flex-wrap">
            {quickBtns.map((b,i) => (
              <button key={i} onClick={() => setBudget(b)}
                className={`px-2 py-1 rounded border ${budget===b ? 'border-blue-500 bg-blue-600/20' : 'border-slate-700 hover:border-slate-500'}`}>
                {[0.5,1,1.5,2,2.5,3][i]}× (${b.toLocaleString()})
              </button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div className="card p-3">
            <div className="text-[10px] uppercase tracking-wider muted">Multiplier</div>
            <div className="text-xl font-semibold">{fmt(result.mult, 2)}×</div>
          </div>
          <div className="card p-3">
            <div className="text-[10px] uppercase tracking-wider muted">Blended CPD</div>
            <div className="text-xl font-semibold">{money(result.effCpd)}</div>
            <div className="text-[10px] muted">break-even ${breakEvenCpd}</div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="card p-4">
          <div className="text-[10px] uppercase tracking-wider muted">Deal-contacts</div>
          <div className="text-2xl font-semibold">{fmt(result.contacts,0)}</div>
          <div className="text-xs muted">vs {baseline.matched_deal_contacts} baseline</div>
        </div>
        <div className="card p-4">
          <div className="text-[10px] uppercase tracking-wider muted">Expected wins</div>
          <div className="text-2xl font-semibold">{fmt(result.wins,1)}</div>
          <div className="text-xs muted">@ {baseline.win_rate_pct}% win rate</div>
        </div>
        <div className="card p-4">
          <div className="text-[10px] uppercase tracking-wider muted">Revenue (1st purchase)</div>
          <div className="text-2xl font-semibold">{money(result.revenue)}</div>
          <div className="text-xs muted">@ ${Math.round(avgWon).toLocaleString()} avg won</div>
        </div>
        <div className="card p-4">
          <div className="text-[10px] uppercase tracking-wider muted">ROAS (1st purchase)</div>
          <div className="text-2xl font-semibold" style={{color: roasColor}}>{fmt(result.roas,2)}×</div>
          <div className="text-xs muted">LTV multiplier applies</div>
        </div>
      </div>

      {result.mode === 'smart' && result.perSet.length > 0 ? (
        <details className="mt-4 text-sm">
          <summary className="cursor-pointer muted">Per-ad-set allocation at this budget</summary>
          <div className="overflow-x-auto">
          <table className="min-w-full mt-2">
            <thead>
              <tr className="text-left muted text-xs border-b border-slate-700">
                <th className="py-2 pr-3">Ad set</th>
                <th className="py-2 px-3 text-right">Action</th>
                <th className="py-2 px-3 text-right">Spend</th>
                <th className="py-2 px-3 text-right">Projected CPD</th>
                <th className="py-2 pl-3 text-right">Deal-contacts</th>
              </tr>
            </thead>
            <tbody>
              {result.perSet.slice().sort((a,b) => b.new_spend - a.new_spend).map(r => (
                <tr key={r.ad_set} className="border-b border-slate-800 text-xs">
                  <td className="py-2 pr-3 font-mono" title={r.ad_set}>{r.ad_set.length > 50 ? r.ad_set.slice(0,49)+'…' : r.ad_set}</td>
                  <td className="py-2 px-3 text-right">
                    <span style={{color: r.action==='cut'?'#f87171':r.action==='scale hard'?'#34d399':r.action==='scale moderate'?'#fbbf24':'#94a3b8'}}>{r.action}</span>
                  </td>
                  <td className="py-2 px-3 text-right">{money(r.new_spend)}</td>
                  <td className="py-2 px-3 text-right">${Math.round(r.new_cpd)}</td>
                  <td className="py-2 pl-3 text-right">{fmt(r.new_contacts,1)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        </details>
      ) : null}

      <div className="mt-4 text-xs muted">
        <span className="font-semibold">Formula:</span> CPL multiplier at scale x = 1 + 0.25·(x−1) + 0.05·(x−1)² ·{' '}
        <span className="font-semibold">Smart mode</span> reallocates away from ad sets with CPD ≥ break-even (${breakEvenCpd}); top ad sets (CPD &lt; $100) get 1.2× of the multiplier, moderate (&lt;$140) get 1.0×, hold tier gets 0.5×.
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
